<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentix // AI Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #020617;
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(34, 211, 238, 0.3);
            --cyan: #0ff;
            --magenta: #f0f;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Neural Canvas Background */
        #neuralCanvas {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0;
            opacity: 0.6;
            pointer-events: none;
        }

        /* Ambient Glows */
        .glow-orb {
            position: absolute;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(14,165,233,0.15) 0%, transparent 60%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            filter: blur(40px);
            animation: pulseGlow 8s infinite alternate ease-in-out;
            pointer-events: none;
        }

        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 
                        inset 0 0 20px rgba(34, 211, 238, 0.05);
            text-align: center;
            max-width: 550px;
            width: 90%;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .terminal-header {
            font-family: 'Share Tech Mono', monospace;
            color: var(--cyan);
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(34, 211, 238, 0.2);
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
        }

        h1.glitch {
            font-weight: 900;
            font-size: 3.5rem;
            margin: 10px 0;
            color: var(--text-main);
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        h1.glitch::before, h1.glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.8;
        }

        h1.glitch::before {
            color: var(--cyan);
            z-index: -1;
            transform: translate(-3px, 1px);
            animation: glitch-anim 3s infinite linear alternate-reverse;
        }

        h1.glitch::after {
            color: var(--magenta);
            z-index: -2;
            transform: translate(3px, -1px);
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip-path: inset(20% 0 80% 0); }
            20% { clip-path: inset(60% 0 10% 0); }
            40% { clip-path: inset(40% 0 50% 0); }
            60% { clip-path: inset(80% 0 5% 0); }
            80% { clip-path: inset(10% 0 70% 0); }
            100% { clip-path: inset(30% 0 20% 0); }
        }

        .typewriter-text {
            font-family: 'Share Tech Mono', monospace;
            color: var(--text-dim);
            font-size: 0.95rem;
            min-height: 24px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .typewriter-text::after {
            content: '_';
            animation: blink 1s step-end infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .upload-area {
            border: 2px dashed rgba(34, 211, 238, 0.3);
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.4);
            padding: 40px 20px;
            position: relative;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--cyan);
            background: rgba(34, 211, 238, 0.1);
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(34, 211, 238, 0.2);
        }

        .upload-area input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }

        .upload-icon {
            font-size: 45px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 12px var(--cyan));
            transition: transform 0.3s ease;
        }

        .upload-area:hover .upload-icon {
            transform: translateY(-5px);
        }

        .upload-text {
            font-family: 'Share Tech Mono', monospace;
            color: var(--cyan);
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .file-name {
            display: block;
            margin-top: 15px;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            min-height: 20px;
            word-break: break-all;
        }

        .submit-btn {
            background: linear-gradient(45deg, rgba(14,165,233,0.1), rgba(139,92,246,0.1));
            color: var(--cyan);
            border: 1px solid var(--cyan);
            border-radius: 12px;
            padding: 16px 32px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 30px;
            display: block;
            opacity: 0.5;
            pointer-events: none;
        }

        .submit-btn.active {
            opacity: 1;
            pointer-events: auto;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }

        .submit-btn.active:hover {
            background: rgba(0, 255, 255, 0.15);
            text-shadow: 0 0 8px var(--cyan);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .submit-btn.active:hover::before {
            left: 150%;
        }

        /* Clear Button */
        .clear-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid #ef4444;
            border-radius: 8px;
            padding: 8px 16px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            cursor: pointer;
            position: absolute;
            top: 20px;
            right: 20px;
            display: none;
            transition: all 0.2s ease;
            z-index: 20;
        }

        .clear-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            border-left: 4px solid #ef4444;
            color: #f8fafc;
            padding: 15px 25px;
            border-radius: 4px;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-close {
            margin-left: 20px;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        .toast-close:hover {
            color: #fff;
        }

        /* Loading Terminal UI */
        .terminal-loader {
            display: none;
            text-align: left;
            margin-top: 20px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(34, 211, 238, 0.3);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Share Tech Mono', monospace;
            color: #10b981;
            font-size: 0.9rem;
            height: 150px;
            overflow-y: hidden;
            position: relative;
        }

        .terminal-loader .line {
            margin-bottom: 5px;
            opacity: 0;
            transform: translateX(-10px);
            animation: slideInText 0.3s forwards;
        }

        @keyframes slideInText {
            to { opacity: 1; transform: translateX(0); }
        }

        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            margin-top: 15px;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
            display: none;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--cyan);
            box-shadow: 0 0 10px var(--cyan);
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>
    <canvas id="neuralCanvas"></canvas>
    <div class="glow-orb"></div>

    <div class="container" id="mainContainer">
        <div class="terminal-header">
            <span>SYS // AUTHENTIX</span>
            <span>STATUS: SECURE</span>
        </div>
        
        <h1 class="glitch" data-text="Authentix">Authentix</h1>
        <div class="typewriter-text" id="typewriter"></div>
        
        <form action="/detect" method="post" enctype="multipart/form-data" id="uploadForm">
            <div class="upload-area" id="dropArea">
                <button type="button" class="clear-btn" id="clearBtn">KILL</button>
                <span class="upload-icon">💠</span>
                <span class="upload-text">INITIALIZE UPLOAD</span>
                <span class="file-name" id="fileName">DRAG & DROP OR CLICK</span>
                <input type="file" name="image" id="fileInput" accept="image/*,video/*,audio/*">
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">RUN ANALYSIS</button>
            
            <div class="progress-bar-container" id="progressContainer">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <div class="terminal-loader" id="terminalLoader"></div>
        </form>
    </div>

    <!-- Toast Notifications Container -->
    <div class="toast-container" id="toastContainer">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                <div class="toast" data-message="{{ message }}">
                    <span>{{ message }}</span>
                    <span class="toast-close" onclick="this.parentElement.remove()">×</span>
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <script>
        // -- 1. Typewriter Effect --
        const textToType = "> UPLOAD MEDIA FOR NEURAL DEEPFAKE ANALYSIS...";
        const typeWriterEl = document.getElementById('typewriter');
        let typeIdx = 0;
        
        function typeText() {
            if (typeIdx < textToType.length) {
                typeWriterEl.textContent += textToType.charAt(typeIdx);
                typeIdx++;
                setTimeout(typeText, 40);
            }
        }
        setTimeout(typeText, 500);

        // -- 2. Drag and Drop & File Input Logic --
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const dropArea = document.getElementById('dropArea');
        const submitBtn = document.getElementById('submitBtn');
        const clearBtn = document.getElementById('clearBtn');
        const toastContainer = document.getElementById('toastContainer');

        const ALLOWED_EXTENSIONS = ['png', 'jpg', 'jpeg', 'webp', 'mp4', 'avi', 'mov', 'mkv', 'wav', 'mp3', 'ogg', 'flac'];
        const MAX_FILE_SIZE = 100 * 1024 * 1024; // 100MB

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <span>${message}</span>
                <span class="toast-close" onclick="this.parentElement.remove()">×</span>
            `;
            toastContainer.appendChild(toast);
            
            // Trigger animation
            setTimeout(() => toast.classList.add('show'), 10);
            
            // Auto remove
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }

        // Show flash messages that came from server initial load
        document.querySelectorAll('.toast').forEach(t => {
            setTimeout(() => t.classList.add('show'), 100);
            setTimeout(() => {
                t.classList.remove('show');
                setTimeout(() => t.remove(), 300);
            }, 5000);
        });

        function clearFile() {
            fileInput.value = '';
            fileName.textContent = 'DRAG & DROP OR CLICK';
            submitBtn.classList.remove('active');
            clearBtn.style.display = 'none';
        }

        clearBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            e.preventDefault();
            clearFile();
        });

        function handleFile(file) {
            if(file) {
                const ext = file.name.split('.').pop().toLowerCase();
                if (!ALLOWED_EXTENSIONS.includes(ext)) {
                    showToast(`ERROR: Unsupported file format (.${ext}).`);
                    clearFile();
                    return;
                }
                
                if (file.size > MAX_FILE_SIZE) {
                    showToast(`ERROR: File exceeds 100MB capacity limits.`);
                    clearFile();
                    return;
                }

                fileName.innerHTML = `<span style="color:var(--cyan)">TARGET:</span> ${file.name}`;
                submitBtn.classList.add('active');
                clearBtn.style.display = 'block';
            } else {
                clearFile();
            }
        }

        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
            dropArea.addEventListener(evt, (e) => { e.preventDefault(); e.stopPropagation(); }, false);
        });

        ['dragenter', 'dragover'].forEach(evt => {
            dropArea.addEventListener(evt, () => dropArea.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(evt => {
            dropArea.addEventListener(evt, () => dropArea.classList.remove('dragover'), false);
        });

        dropArea.addEventListener('drop', (e) => {
            let file = e.dataTransfer.files[0];
            fileInput.files = e.dataTransfer.files;
            handleFile(file);
        }, false);

        // -- 3. Dynamic Terminal Loading Sequence --
        const form = document.getElementById('uploadForm');
        const terminalLoader = document.getElementById('terminalLoader');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');

        const terminalSteps = [
            ">> INITIALIZING NEURAL ENGINE...",
            ">> BYPASSING SECURITY PROTOCOLS...",
            ">> EXTRACTING FACIAL LANDMARKS...",
            ">> RUNNING TENSORFLOW MODELS...",
            ">> CHECKING NOISE PATTERNS...",
            ">> COMPUTING DEEPFAKE PROBABILITY...",
            ">> FINALIZING METRICS..."
        ];

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            if(!fileInput.files || fileInput.files.length === 0) {
                showToast("ERROR: No payload attached for analysis.");
                return;
            }

            submitBtn.style.display = 'none';
            dropArea.style.display = 'none';
            
            terminalLoader.style.display = 'block';
            progressContainer.style.display = 'block';
            
            let currentStep = 0;
            let progress = 0;

            // Fake terminal lines appearing
            const stepInterval = setInterval(() => {
                if (currentStep < terminalSteps.length) {
                    const line = document.createElement('div');
                    line.className = 'line';
                    line.textContent = terminalSteps[currentStep];
                    terminalLoader.appendChild(line);
                    terminalLoader.scrollTop = terminalLoader.scrollHeight;
                    currentStep++;
                }
            }, 300); // add line every 300ms

            // Fake progress bar filling up
            const progressInterval = setInterval(() => {
                progress += Math.random() * 5 + 2;
                if(progress >= 100) {
                    progress = 100;
                    clearInterval(progressInterval);
                    clearInterval(stepInterval);
                    
                    const finalLine = document.createElement('div');
                    finalLine.className = 'line';
                    finalLine.style.color = 'var(--cyan)';
                    finalLine.style.marginTop = '10px';
                    finalLine.textContent = ">> UPLOADING PAYLOAD TO SERVER...";
                    terminalLoader.appendChild(finalLine);
                    terminalLoader.scrollTop = terminalLoader.scrollHeight;

                    // Actually submit the form after a tiny delay
                    setTimeout(() => {
                        form.submit();
                    }, 600);
                }
                progressFill.style.width = `${progress}%`;
            }, 100);
        });

        // -- 4. Neural Canvas Background --
        const canvas = document.getElementById('neuralCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles;

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            let particleCount = Math.floor((width * height) / 15000);
            for(let i=0; i<particleCount; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 1,
                    vy: (Math.random() - 0.5) * 1,
                    radius: Math.random() * 1.5 + 0.5
                });
            }
        }
        
        function animateCanvas() {
            requestAnimationFrame(animateCanvas);
            ctx.clearRect(0, 0, width, height);
            
            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                
                if(p.x < 0 || p.x > width) p.vx *= -1;
                if(p.y < 0 || p.y > height) p.vy *= -1;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(34, 211, 238, 0.5)';
                ctx.fill();
                
                // Draw lines between close particles
                for(let j=index+1; j<particles.length; j++) {
                    let p2 = particles[j];
                    let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if(dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(34, 211, 238, ${0.15 - dist/800})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            });
        }
        
        initCanvas();
        animateCanvas();
        window.addEventListener('resize', initCanvas);

        // -- 5. 3D Tilt Effect on Container --
        const container = document.getElementById('mainContainer');
        document.body.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 40;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 40;
            container.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
        
        document.body.addEventListener('mouseleave', () => {
            container.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

    </script>
</body>
</html>
